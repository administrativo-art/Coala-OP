<svg xmlns="http://www.w3.org/2000/svg" width="360" height="640" viewBox="0 0 360 640" preserveAspectRatio="xMidYMid slice" fill="none">
  <defs>
    <!-- Blur para os blobs -->
    <filter id="blur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="40" />
    </filter>
  </defs>

  <!-- Fundo claro -->
  <rect width="360" height="640" fill="#FCF5F9"/>

  <!-- Blobs orgânicos com blur -->
  <circle cx="90"  cy="180" r="100" fill="#4CC6D3" filter="url(#blur)" opacity="0.6"/>
  <circle cx="270" cy="220" r="80"  fill="#F883B6" filter="url(#blur)" opacity="0.5"/>
  <circle cx="180" cy="450" r="120" fill="#FBD243" filter="url(#blur)" opacity="0.4"/>
  <ellipse cx="300" cy="520" rx="90" ry="60" fill="#FBD243" opacity="0.3"/>
  <ellipse cx="60"  cy="520" rx="70" ry="45" fill="#4CC6D3" opacity="0.3"/>

  <!-- Pequenos pontos para textura sutil -->
  <g opacity="0.15">
    <circle cx="50"  cy="100" r="4" fill="#fff"/>
    <circle cx="320" cy="150" r="3" fill="#fff"/>
    <circle cx="200" cy="600" r="5" fill="#fff"/>
    <circle cx="30"  cy="580" r="3" fill="#fff"/>
    <circle cx="340" cy="50"  r="4" fill="#fff"/>
  </g>
</svg>
